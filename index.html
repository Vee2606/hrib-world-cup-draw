<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Draw</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🏆 World Cup Draw</h1>

    <p id="lastUpdated"></p>

    <!-- 🔥 SIDE BY SIDE LAYOUT -->
    <div class="layout">

        <!-- 🟢 STILL IN -->
        <div class="column">
            <h2>🟢 Still In</h2>
            <div id="activeTeams"></div>
        </div>

        <!-- ❌ ELIMINATED -->
        <div class="column">
            <h2>❌ Eliminated</h2>
            <div id="eliminatedTeams"></div>
        </div>

        <!-- 📅 FIXTURES -->
        <div class="column">
            <h2>📅 Upcoming Fixtures</h2>
            <div id="fixtures"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
